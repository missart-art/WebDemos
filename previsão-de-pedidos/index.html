<script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
<script>
  stlite.mount({
    requirements: ["pandas"],
    files: {
        "app.py": "import streamlit as st\nst.write('Stlite está vivo!')"
    },
    entrypoint: "app.py"
  }, document.getElementById("root"));
</script>
<div id="root"></div>
